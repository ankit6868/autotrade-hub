services:
  # ── FastAPI Backend ───────────────────────────────────────────────────────
  - type: web
    name: autotrade-backend
    runtime: docker
    dockerfilePath: ./Dockerfile.backend
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: autotrade-db
          property: connectionString
      - key: APP_SECRET_KEY
        generateValue: true
      - key: CLERK_JWKS_URL
        value: ""          # fill in from Clerk dashboard
      - key: CLERK_ISSUER
        value: ""
      - key: CORS_ALLOWED_ORIGINS
        value: "https://autotrade-frontend.onrender.com"
      - key: ENV
        value: production
      - key: ENABLE_DOCS
        value: "false"
      - key: RUN_MIGRATIONS
        value: "1"

  # ── Next.js Frontend ──────────────────────────────────────────────────────
  - type: web
    name: autotrade-frontend
    runtime: docker
    dockerContext: ./frontend
    dockerfilePath: ./frontend/Dockerfile.prod
    envVars:
      - key: BACKEND_URL
        fromService:
          type: web
          name: autotrade-backend
          envVarKey: RENDER_INTERNAL_HOSTNAME
      - key: NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY
        value: ""          # fill in from Clerk dashboard
      - key: CLERK_SECRET_KEY
        value: ""

databases:
  - name: autotrade-db
    plan: free
    databaseName: tradebot
    user: tradebot
