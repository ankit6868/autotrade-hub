# Render Blueprint — backend only (frontend on Vercel, DB on Supabase)
#
# To deploy:
#   1. Go to https://dashboard.render.com/blueprints
#   2. Click "New Blueprint Instance" → connect this repo
#   3. Render reads this file and creates the autotrade-backend service
#   4. Fill in the blank env vars below in the dashboard:
#        - DATABASE_URL          (Supabase session pooler URI)
#        - CLERK_JWKS_URL        (https://<sub>.clerk.accounts.dev/.well-known/jwks.json)
#        - CLERK_ISSUER          (https://<sub>.clerk.accounts.dev)
#        - CORS_ALLOWED_ORIGINS  (your Vercel URL, comma-separated)

services:
  # ── FastAPI Backend ───────────────────────────────────────────────────────
  - type: web
    name: autotrade-backend
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./Dockerfile.backend
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        sync: false                           # set in dashboard → Supabase URI
      - key: APP_SECRET_KEY
        generateValue: true
      - key: CLERK_JWKS_URL
        sync: false                           # set in dashboard
      - key: CLERK_ISSUER
        sync: false                           # set in dashboard
      - key: CORS_ALLOWED_ORIGINS
        sync: false                           # set in dashboard → Vercel URL
      - key: ENV
        value: production
      - key: ENABLE_DOCS
        value: "false"
      - key: RUN_MIGRATIONS
        value: "1"
      - key: APP_VERSION
        value: "1.0.0"
